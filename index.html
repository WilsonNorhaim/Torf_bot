<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queen Messenger Prototype</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --primary-purple: #8B5CF6;
            --primary-purple-hover: #7C3AED;
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.9);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.12);
            --text-main: #1F2937;
            --text-secondary: #6B7280;
            --bg-image: url('https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=2070&auto=format&fit=crop');
            --message-bg-me: linear-gradient(135deg, var(--primary-purple), #A78BFA);
            --message-bg-other: rgba(255, 255, 255, 0.6);
            --input-bg: rgba(255, 255, 255, 0.85);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: var(--bg-image);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .phone-frame {
            width: 375px;
            height: 812px;
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 44px;
            border: 9px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 25px 60px rgba(0,0,0,0.25);            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* --- ВЕРХНЯЯ ПАНЕЛЬ --- */
        .top-bar {
            height: 56px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 18px;
            margin: 12px;
            border-radius: 22px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            z-index: 20;
        }

        .logo {
            font-weight: 800;
            font-size: 19px;
            color: var(--primary-purple);
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            gap: 7px;
        }
        
        .logo i { font-size: 22px; }

        .top-actions {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .loader-container {
            width: 22px;
            height: 22px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .spinner {
            width: 18px;
            height: 18px;
            border: 2.5px solid rgba(139, 92, 246, 0.3);            border-radius: 50%;
            border-top-color: var(--primary-purple);
            animation: spin 1s ease-in-out infinite;
        }

        .search-icon {
            font-size: 22px;
            color: var(--primary-purple);
            cursor: pointer;
            display: none;
            transition: transform 0.2s;
        }
        .search-icon:hover { transform: scale(1.12); }

        .profile-pic {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--primary-purple);
            cursor: pointer;
            transition: transform 0.2s;
        }
        .profile-pic:hover { transform: scale(1.06); }

        /* --- МЕНЮ ПРОФИЛЯ --- */
        .profile-menu {
            position: absolute;
            top: 68px;
            right: 18px;
            width: 270px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border-radius: 26px;
            border: 1px solid rgba(255, 255, 255, 0.95);
            box-shadow: 0 12px 45px rgba(0,0,0,0.18);
            padding: 18px 16px;
            transform: translateY(-18px) scale(0.97);
            opacity: 0;
            pointer-events: none;
            transition: all 0.28s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 100;
        }

        .profile-menu.active {
            transform: translateY(0) scale(1);
            opacity: 1;
            pointer-events: all;
        }
        .menu-header {
            display: flex;
            align-items: center;
            gap: 11px;
            margin-bottom: 16px;
            padding-bottom: 14px;
            border-bottom: 1px solid rgba(0,0,0,0.06);
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 11px;
            padding: 11px 8px;
            color: var(--text-main);
            font-weight: 500;
            font-size: 14px;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.18s;
        }
        .menu-item:hover {
            background: rgba(139, 92, 246, 0.12);
            color: var(--primary-purple);
        }
        .menu-item i { font-size: 19px; color: var(--primary-purple); }

        /* --- ОСНОВНОЙ КОНТЕНТ --- */
        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 0 14px 16px 14px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scrollbar-width: none;
        }
        .content-area::-webkit-scrollbar { display: none; }

        /* Сторис */
        .stories-panel {
            height: 84px;
            border-radius: 26px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            display: flex;
            align-items: center;
            padding: 0 12px;            gap: 13px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .stories-panel::-webkit-scrollbar { display: none; }

        .story-item {
            min-width: 58px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
        }
        .story-ring {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            padding: 2px;
            background: linear-gradient(45deg, var(--primary-purple), #C084FC);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .story-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid white;
            object-fit: cover;
            background: #eee;
        }
        .story-name {
            font-size: 10px;
            color: var(--text-secondary);
            text-align: center;
            max-width: 58px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 500;
        }

        /* Список чатов - компактный и скруглённый */
        .chat-list-container {
            flex: 1;
            border-radius: 28px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            overflow-y: auto;
            scrollbar-width: none;
        }
        .chat-list-container::-webkit-scrollbar { display: none; }

        .section-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--text-secondary);
            margin: 6px 8px 4px 10px;
            font-weight: 700;
            opacity: 0.85;
        }

        .chat-card {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 11px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.45);
            border: 1px solid rgba(255, 255, 255, 0.6);
            cursor: pointer;
            transition: all 0.22s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }
        .chat-card:hover {
            background: rgba(255, 255, 255, 0.8);
            transform: translateX(3px);
            box-shadow: 0 4px 16px rgba(139, 92, 246, 0.15);
        }
        .chat-card.active {
            background: rgba(139, 92, 246, 0.18);
            border-color: var(--primary-purple);
        }

        .chat-avatar {
            width: 44px;
            height: 44px;
            border-radius: 16px;
            object-fit: cover;
            background: #ddd;
            flex-shrink: 0;
            border: 2px solid white;            box-shadow: 0 3px 10px rgba(0,0,0,0.08);
        }

        .chat-info {
            flex: 1;
            overflow: hidden;
            min-width: 0;
        }

        .chat-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 2px;
            align-items: center;
        }

        .chat-name {
            font-weight: 600;
            font-size: 14px;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 140px;
        }

        .chat-time {
            font-size: 11px;
            color: var(--text-secondary);
            font-weight: 500;
            flex-shrink: 0;
        }

        .chat-preview {
            font-size: 12px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: flex;
            align-items: center;
            gap: 4px;
            line-height: 1.3;
        }
        .chat-preview i { font-size: 13px; color: var(--primary-purple); }

        .unread-badge {
            background: var(--primary-purple);
            color: white;
            font-size: 10px;            font-weight: 700;
            padding: 3px 7px;
            border-radius: 10px;
            min-width: 17px;
            text-align: center;
            flex-shrink: 0;
            box-shadow: 0 2px 6px rgba(139, 92, 246, 0.35);
        }

        /* === ЧАТ ВИД === */
        .chat-view {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(248, 250, 252, 0.92);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            z-index: 30;
            display: none;
            flex-direction: column;
            transform: scale(0.98);
            opacity: 0;
            transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .chat-view.active {
            display: flex;
            transform: scale(1);
            opacity: 1;
        }

        /* Шапка чата */
        .chat-header-bar {
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            margin: 14px;
            border-radius: 24px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            z-index: 35;
        }

        .chat-header-left {
            display: flex;            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .chat-header-avatar {
            width: 40px;
            height: 40px;
            border-radius: 14px;
            object-fit: cover;
            border: 2px solid var(--primary-purple);
            background: #eee;
        }

        .chat-header-nickname {
            font-weight: 600;
            font-size: 15px;
            color: var(--text-main);
        }

        .chat-header-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header-icon {
            font-size: 21px;
            color: var(--primary-purple);
            cursor: pointer;
            transition: transform 0.18s;
            padding: 6px;
            border-radius: 12px;
        }
        .header-icon:hover {
            background: rgba(139, 92, 246, 0.12);
            transform: scale(1.08);
        }

        /* Область сообщений */
        .messages-container {
            flex: 1;
            padding: 8px 16px 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            scrollbar-width: none;
        }
        .messages-container::-webkit-scrollbar { display: none; }
        .message {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 20px;
            font-size: 14px;
            line-height: 1.4;
            position: relative;
            animation: messageIn 0.28s ease-out;
        }

        @keyframes messageIn {
            from { opacity: 0; transform: translateY(12px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .message.me {
            align-self: flex-end;
            background: var(--message-bg-me);
            color: white;
            border-bottom-right-radius: 6px;
            box-shadow: 0 4px 14px rgba(139, 92, 246, 0.35);
        }

        .message.other {
            align-self: flex-start;
            background: var(--message-bg-other);
            color: var(--text-main);
            border-bottom-left-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.7);
        }

        .message-time {
            font-size: 10px;
            opacity: 0.85;
            margin-top: 4px;
            text-align: right;
            display: block;
        }
        .message.other .message-time { text-align: left; }

        /* Панель ввода */
        .input-bar {
            height: 56px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 14px;
            margin: 12px;
            border-radius: 22px;            background: var(--input-bg);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            z-index: 35;
        }

        .input-action {
            width: 36px;
            height: 36px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-purple);
            font-size: 20px;
            cursor: pointer;
            transition: all 0.18s;
            flex-shrink: 0;
        }
        .input-action:hover {
            background: rgba(139, 92, 246, 0.15);
            transform: scale(1.08);
        }

        .message-input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 14px;
            color: var(--text-main);
            outline: none;
            padding: 8px 4px;
        }
        .message-input::placeholder { color: var(--text-secondary); opacity: 0.8; }

        .send-btn {
            width: 40px;
            height: 40px;
            border-radius: 14px;
            background: var(--primary-purple);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            flex-shrink: 0;
        }        .send-btn:hover {
            background: var(--primary-purple-hover);
            transform: scale(1.06);
            box-shadow: 0 4px 14px rgba(139, 92, 246, 0.4);
        }
        .send-btn:active { transform: scale(0.96); }

        .mic-btn {
            width: 38px;
            height: 38px;
            border-radius: 13px;
            background: rgba(139, 92, 246, 0.12);
            color: var(--primary-purple);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 19px;
            cursor: pointer;
            transition: all 0.18s;
            border: none;
            flex-shrink: 0;
        }
        .mic-btn:hover {
            background: rgba(139, 92, 246, 0.22);
            transform: scale(1.08);
        }

        /* Анимации */
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Кнопка назад в чате */
        .back-btn {
            position: absolute;
            top: 18px;
            left: 18px;
            width: 38px;
            height: 38px;
            border-radius: 13px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-purple);
            font-size: 20px;
            cursor: pointer;
            z-index: 40;
            transition: all 0.2s;
            display: none;
        }        .back-btn.visible { display: flex; }
        .back-btn:hover {
            background: rgba(139, 92, 246, 0.15);
            transform: scale(1.08);
        }

        /* Анимация расширения карточки */
        .chat-card.expanding {
            animation: expandCard 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes expandCard {
            0% {
                border-radius: 20px;
                transform: scale(1);
                opacity: 1;
            }
            50% {
                border-radius: 28px;
                transform: scale(1.03);
                opacity: 0.95;
            }
            100% {
                border-radius: 28px;
                transform: scale(1);
                opacity: 1;
            }
        }

        /* Плавное появление элементов */
        .fade-in {
            animation: fadeIn 0.35s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Статус онлайн */
        .online-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #22C55E;
            border: 2px solid white;
            position: absolute;
            bottom: 2px;
            right: 2px;
            box-shadow: 0 0 0 2px var(--primary-purple);
        }        .avatar-wrapper {
            position: relative;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <!-- Кнопка назад -->
        <div class="back-btn" id="back-btn">
            <i class="ph ph-caret-left"></i>
        </div>

        <!-- ВЕРХНЯЯ ПАНЕЛЬ -->
        <div class="top-bar">
            <div class="logo">
                <i class="ph ph-crown-simple"></i>
                Queen
            </div>
            <div class="top-actions">
                <div class="loader-container">
                    <div class="spinner" id="loader"></div>
                    <i class="ph ph-magnifying-glass search-icon" id="search-icon"></i>
                </div>
                <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=200&auto=format&fit=crop" alt="Profile" class="profile-pic" id="profile-pic">
            </div>
        </div>

        <!-- МЕНЮ ПРОФИЛЯ -->
        <div class="profile-menu" id="profile-menu">
            <div class="menu-header">
                <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=200&auto=format&fit=crop" style="width: 38px; height: 38px; border-radius: 12px;" alt="Me">
                <div>
                    <div style="font-weight: 700; color: var(--text-main); font-size: 14px;">Алина</div>
                    <div style="font-size: 11px; color: var(--text-secondary);">@alina_queen</div>
                </div>
            </div>
            <div class="menu-item"><i class="ph ph-user-plus"></i> Найти контакты</div>
            <div class="menu-item"><i class="ph ph-chats-circle"></i> Новый чат</div>
            <div class="menu-item"><i class="ph ph-palette"></i> Оформление</div>
            <div class="menu-item"><i class="ph ph-gear"></i> Настройки</div>
            <div class="menu-item"><i class="ph ph-sign-out"></i> Выйти</div>
        </div>

        <!-- ОСНОВНОЙ КОНТЕНТ -->
        <div class="content-area">
            <!-- Сторис -->
            <div class="stories-panel">
                <div class="story-item">
                    <div class="story-ring">                        <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=200&auto=format&fit=crop" class="story-img" alt="Story">
                    </div>
                    <span class="story-name">Мария</span>
                </div>
                <div class="story-item">
                    <div class="story-ring">
                        <img src="https://images.unsplash.com/photo-1527980965255-d3b416303d12?q=80&w=200&auto=format&fit=crop" class="story-img" alt="Story">
                    </div>
                    <span class="story-name">Олег</span>
                </div>
                <div class="story-item">
                    <div class="story-ring">
                        <img src="https://images.unsplash.com/photo-1570295999919-56ceb5ecca61?q=80&w=200&auto=format&fit=crop" class="story-img" alt="Story">
                    </div>
                    <span class="story-name">Макс</span>
                </div>
                <div class="story-item">
                    <div class="story-ring" style="background: linear-gradient(135deg, #e2e8f0, #cbd5e1); display:flex; align-items:center; justify-content:center;">
                        <i class="ph ph-plus" style="color: var(--primary-purple); font-size: 22px; font-weight: 600;"></i>
                    </div>
                    <span class="story-name">Моя</span>
                </div>
            </div>

            <!-- Список чатов -->
            <div class="chat-list-container">
                <div class="section-title">Сообщения</div>

                <!-- Чат 1: Дизайн Команда (связан с Чатом 2) -->
                <div class="chat-card" data-chat-id="chat1" data-linked="chat2">
                    <div class="avatar-wrapper">
                        <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?q=80&w=200&auto=format&fit=crop" class="chat-avatar" alt="User">
                        <span class="online-dot"></span>
                    </div>
                    <div class="chat-info">
                        <div class="chat-header">
                            <span class="chat-name">Дизайн Команда</span>
                            <span class="chat-time">14:20</span>
                        </div>
                        <div class="chat-preview">
                            <i class="ph ph-image"></i>
                            <span>Алина: Скинула макеты...</span>
                        </div>
                    </div>
                    <div class="unread-badge">2</div>
                </div>

                <!-- Чат 2: Елена Смирнова (связан с Чатом 1) -->
                <div class="chat-card" data-chat-id="chat2" data-linked="chat1">
                    <div class="avatar-wrapper">                        <img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?q=80&w=200&auto=format&fit=crop" class="chat-avatar" alt="User">
                        <span class="online-dot"></span>
                    </div>
                    <div class="chat-info">
                        <div class="chat-header">
                            <span class="chat-name">Елена Смирнова</span>
                            <span class="chat-time">Вчера</span>
                        </div>
                        <div class="chat-preview">
                            <span>Привет! Как насчет встречи...</span>
                        </div>
                    </div>
                </div>

                <!-- Чат 3 -->
                <div class="chat-card" data-chat-id="chat3">
                    <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?q=80&w=200&auto=format&fit=crop" class="chat-avatar" alt="User">
                    <div class="chat-info">
                        <div class="chat-header">
                            <span class="chat-name">Рабочий чат</span>
                            <span class="chat-time">Вчера</span>
                        </div>
                        <div class="chat-preview">
                            <i class="ph ph-doc-text"></i>
                            <span>Отчет за квартал.pdf</span>
                        </div>
                    </div>
                    <div class="unread-badge">5</div>
                </div>

                <!-- Чат 4 -->
                <div class="chat-card" data-chat-id="chat4">
                    <img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?q=80&w=200&auto=format&fit=crop" class="chat-avatar" alt="User">
                    <div class="chat-info">
                        <div class="chat-header">
                            <span class="chat-name">Иван Техподдержка</span>
                            <span class="chat-time">Пн</span>
                        </div>
                        <div class="chat-preview">
                            <span>Ваш запрос обработан.</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ЧАТ ВИД -->
        <div class="chat-view" id="chat-view">
            <div class="chat-header-bar">
                <div class="chat-header-left" id="chat-header-left">                    <img src="" class="chat-header-avatar" id="chat-avatar" alt="Avatar">
                    <span class="chat-header-nickname" id="chat-nickname">Имя</span>
                </div>
                <div class="chat-header-actions">
                    <i class="ph ph-video-camera header-icon" title="Видеозвонок"></i>
                    <i class="ph ph-dots-three header-icon" title="Меню"></i>
                </div>
            </div>

            <div class="messages-container" id="messages-container">
                <!-- Сообщения будут добавляться сюда -->
            </div>

            <div class="input-bar">
                <div class="input-action" title="Прикрепить">
                    <i class="ph ph-plus"></i>
                </div>
                <input type="text" class="message-input" id="message-input" placeholder="Напишите сообщение..." autocomplete="off">
                <button class="mic-btn" title="Голосовое">
                    <i class="ph ph-microphone"></i>
                </button>
                <button class="send-btn" id="send-btn" title="Отправить">
                    <i class="ph ph-paper-plane-right"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // === ЭЛЕМЕНТЫ ===
            const spinner = document.getElementById('loader');
            const searchIcon = document.getElementById('search-icon');
            const profilePic = document.getElementById('profile-pic');
            const profileMenu = document.getElementById('profile-menu');
            const chatCards = document.querySelectorAll('.chat-card');
            const chatView = document.getElementById('chat-view');
            const backBtn = document.getElementById('back-btn');
            const chatAvatar = document.getElementById('chat-avatar');
            const chatNickname = document.getElementById('chat-nickname');
            const chatHeaderLeft = document.getElementById('chat-header-left');
            const messagesContainer = document.getElementById('messages-container');
            const messageInput = document.getElementById('message-input');
            const sendBtn = document.getElementById('send-btn');
            
            // === ЗАГРУЗКА ===
            setTimeout(() => {
                spinner.style.display = 'none';
                searchIcon.style.display = 'block';
            }, 1800);
            // === МЕНЮ ПРОФИЛЯ ===
            profilePic.addEventListener('click', (e) => {
                e.stopPropagation();
                profileMenu.classList.toggle('active');
            });
            document.addEventListener('click', (e) => {
                if (!profileMenu.contains(e.target) && e.target !== profilePic) {
                    profileMenu.classList.remove('active');
                }
            });

            // === ДАННЫЕ ЧАТОВ ===
            const chatData = {
                'chat1': {
                    name: 'Дизайн Команда',
                    avatar: 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?q=80&w=200&auto=format&fit=crop',
                    messages: [
                        { text: 'Привет! Готовы к обсуждению макетов?', time: '14:15', me: false },
                        { text: 'Да, только загрузила последние правки ✨', time: '14:17', me: true },
                        { text: 'Супер! Посмотрим после обеда', time: '14:18', me: false }
                    ]
                },
                'chat2': {
                    name: 'Елена Смирнова',
                    avatar: 'https://images.unsplash.com/photo-1524504388940-b1c1722653e1?q=80&w=200&auto=format&fit=crop',
                    messages: [
                        { text: 'Привет! Как насчет встречи завтра?', time: '18:30', me: false },
                        { text: 'Привет! Да, давай в 15:00?', time: '18:32', me: true }
                    ]
                },
                'chat3': {
                    name: 'Рабочий чат',
                    avatar: 'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?q=80&w=200&auto=format&fit=crop',
                    messages: [
                        { text: 'Коллеги, напоминаю про дедлайн', time: '09:15', me: false },
                        { text: 'Отчет за квартал.pdf', time: '11:22', me: false, file: true }
                    ]
                },
                'chat4': {
                    name: 'Иван Техподдержка',
                    avatar: 'https://images.unsplash.com/photo-1500648767791-00dcc994a43e?q=80&w=200&auto=format&fit=crop',
                    messages: [
                        { text: 'Ваш запрос #4821 обработан', time: '10:05', me: false }
                    ]
                }
            };

            let currentChatId = null;
            let audioContext = null;
            // === ИНИЦИАЛИЗАЦИЯ АУДИО ===
            function initAudio() {
                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
            }

            // === ЗВУК УВЕДОМЛЕНИЯ "QUEEN" ===
            function playQueenSound() {
                initAudio();
                if (!audioContext) return;
                
                const now = audioContext.currentTime;
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                // Мелодичный "королевский" звук: два тона с вибрацией
                oscillator.frequency.setValueAtTime(660, now); // E5
                oscillator.frequency.exponentialRampToValueAtTime(880, now + 0.08); // A5
                oscillator.frequency.exponentialRampToValueAtTime(660, now + 0.16);
                
                gainNode.gain.setValueAtTime(0.3, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
                
                oscillator.start(now);
                oscillator.stop(now + 0.25);
                
                // Легкое эхо
                setTimeout(() => {
                    const osc2 = audioContext.createOscillator();
                    const gain2 = audioContext.createGain();
                    osc2.connect(gain2);
                    gain2.connect(audioContext.destination);
                    osc2.frequency.value = 880;
                    gain2.gain.setValueAtTime(0.08, audioContext.currentTime);
                    gain2.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.15);
                    osc2.start();
                    osc2.stop(audioContext.currentTime + 0.15);
                }, 80);
            }

            // === ОТКРЫТИЕ ЧАТА ===
            chatCards.forEach(card => {
                card.addEventListener('click', function() {
                    const chatId = this.dataset.chatId;
                    const chat = chatData[chatId];                    if (!chat) return;
                    
                    // Анимация карточки
                    this.classList.add('expanding');
                    
                    // Заполнение данных чата
                    chatAvatar.src = chat.avatar;
                    chatNickname.textContent = chat.name;
                    
                    // Очистка и рендер сообщений
                    messagesContainer.innerHTML = '';
                    chat.messages.forEach(msg => {
                        addMessageToView(msg.text, msg.time, msg.me, msg.file);
                    });
                    
                    // Показать чат
                    setTimeout(() => {
                        chatView.classList.add('active');
                        backBtn.classList.add('visible');
                        currentChatId = chatId;
                        this.classList.remove('expanding');
                        this.classList.add('active');
                        
                        // Скролл вниз
                        setTimeout(() => {
                            messagesContainer.scrollTop = messagesContainer.scrollHeight;
                        }, 100);
                    }, 250);
                });
            });

            // === ЗАКРЫТИЕ ЧАТА ===
            backBtn.addEventListener('click', () => {
                if (currentChatId) {
                    document.querySelector(`.chat-card[data-chat-id="${currentChatId}"]`)?.classList.remove('active');
                }
                chatView.classList.remove('active');
                backBtn.classList.remove('visible');
                currentChatId = null;
                messageInput.value = '';
            });

            // Клик по шапке чата тоже закрывает
            chatHeaderLeft.addEventListener('click', () => {
                backBtn.click();
            });

            // === ДОБАВЛЕНИЕ СООБЩЕНИЯ В ВИД ===
            function addMessageToView(text, time, isMe, isFile = false) {
                const msgEl = document.createElement('div');                msgEl.className = `message ${isMe ? 'me' : 'other'} fade-in`;
                
                let content = text;
                if (isFile) {
                    content = `<i class="ph ph-file" style="margin-right:4px;vertical-align:middle;"></i>${text}`;
                }
                
                msgEl.innerHTML = `
                    ${content}
                    <span class="message-time">${time}</span>
                `;
                messagesContainer.appendChild(msgEl);
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
                return msgEl;
            }

            // === ОТПРАВКА СООБЩЕНИЯ ===
            function sendMessage() {
                const text = messageInput.value.trim();
                if (!text || !currentChatId) return;
                
                const time = new Date().toLocaleTimeString('ru-RU', {hour: '2-digit', minute:'2-digit'});
                
                // Добавляем в текущий чат
                addMessageToView(text, time, true);
                chatData[currentChatId].messages.push({ text, time, me: true });
                
                messageInput.value = '';
                
                // === ВЗАИМОСВЯЗАННЫЕ ЧАТЫ ===
                const currentCard = document.querySelector(`.chat-card[data-chat-id="${currentChatId}"]`);
                const linkedChatId = currentCard?.dataset.linked;
                
                if (linkedChatId && chatData[linkedChatId]) {
                    // Имитация задержки "доставки"
                    setTimeout(() => {
                        // Добавляем сообщение в связанный чат
                        chatData[linkedChatId].messages.push({ 
                            text: text, 
                            time: time, 
                            me: false 
                        });
                        
                        // Если связанный чат открыт - показываем сообщение
                        if (currentChatId === linkedChatId) return;
                        
                        const linkedCard = document.querySelector(`.chat-card[data-chat-id="${linkedChatId}"]`);
                        if (linkedCard) {
                            // Обновляем превью
                            const preview = linkedCard.querySelector('.chat-preview');                            preview.innerHTML = `<span>Вы: ${text.substring(0, 25)}${text.length > 25 ? '...' : ''}</span>`;
                            
                            // Добавляем бейдж
                            let badge = linkedCard.querySelector('.unread-badge');
                            if (!badge) {
                                badge = document.createElement('div');
                                badge.className = 'unread-badge';
                                linkedCard.querySelector('.chat-info').appendChild(badge);
                            }
                            badge.textContent = parseInt(badge.textContent || '0') + 1;
                            
                            // Звук уведомления!
                            playQueenSound();
                            
                            // Визуальный эффект
                            linkedCard.style.animation = 'none';
                            setTimeout(() => {
                                linkedCard.style.animation = 'messageIn 0.3s ease-out';
                            }, 10);
                        }
                    }, 400);
                }
            }

            // Обработчики отправки
            sendBtn.addEventListener('click', sendMessage);
            messageInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendMessage();
            });

            // === ПЛЮС КНОПКА (заглушка) ===
            document.querySelector('.input-action').addEventListener('click', function() {
                // Анимация нажатия
                this.style.transform = 'scale(0.92)';
                setTimeout(() => {
                    this.style.transform = '';
                    // В реальном приложении здесь открытие меню вложений
                    if (currentChatId) {
                        addMessageToView('📎 Вложение (демо)', new Date().toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'}), true);
                    }
                }, 150);
            });

            // === МИКРОФОН (заглушка) ===
            document.querySelector('.mic-btn').addEventListener('click', function() {
                this.style.background = 'rgba(239, 68, 68, 0.2)';
                this.style.color = '#EF4444';
                setTimeout(() => {
                    this.style.background = '';
                    this.style.color = '';                    if (currentChatId) {
                        addMessageToView('🎤 Голосовое сообщение (0:12)', new Date().toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'}), true);
                    }
                }, 300);
            });

            // === АДАПТИВНОСТЬ КЛАВИАТУРЫ (для мобильных) ===
            messageInput.addEventListener('focus', () => {
                // На мобильных можно добавить скролл
                if (window.innerWidth < 400) {
                    setTimeout(() => {
                        messagesContainer.scrollBy({ top: 100, behavior: 'smooth' });
                    }, 300);
                }
            });
        });
    </script>
</body>
</html>
