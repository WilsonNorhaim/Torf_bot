<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faber AI</title>
    <link rel="stylesheet" href="style.css">
    <!-- Подключаем иконки (для стрелки и меню) -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>

    <!-- Экран загрузки -->
    <div id="loader-screen">
        <img src="faber.png" alt="Faber Logo" class="loader-logo">
    </div>

    <!-- Основной интерфейс -->
    <div class="app-container">
        
        <!-- Шапка -->
        <header class="top-header">
            <div class="brand">
                <img src="faber.png" alt="Logo" class="brand-logo">
                <span>Faber</span>
            </div>
        </header>

        <!-- Область чата -->
        <main class="chat-area" id="chat-area">
            <!-- Сообщения будут появляться здесь -->
            <div class="welcome-message">
                <p>Привет! Я Faber. Чем могу помочь?</p>
            </div>
        </main>

        <!-- Боковая панель (История) -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h3>История</h3>
                <button onclick="toggleSidebar()"><i class="fas fa-times"></i></button>
            </div>
            <div class="history-list" id="history-list">
                <!-- Сюда JS добавит историю -->
            </div>
        </aside>
        <!-- Затемнение фона при открытой панели -->
        <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

        <!-- Панель ввода -->        <div class="input-container">
            <!-- Кнопка меню (Жидкое стекло) -->
            <button class="glass-btn menu-btn" onclick="toggleSidebar()">
                <i class="fas fa-bars"></i>
            </button>

            <!-- Поле ввода (Жидкое стекло) -->
            <div class="input-wrapper">
                <input type="text" id="user-input" placeholder="Спросите Faber..." autocomplete="off">
                <button class="send-btn" id="send-btn">
                    <i class="fas fa-arrow-right"></i>
                </button>
            </div>
        </div>

        <!-- Футер -->
        <footer class="footer">
            <p>Wilson Corporation 2026© | Faber может ошибаться</p>
        </footer>

    </div>

    <script>
        // --- Логика Загрузки ---
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loader-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loader-screen').style.display = 'none';
                }, 500); // Плавное исчезновение
            }, 3000); // 3 секунды задержки
        });

        // --- Логика Интерфейса ---
        const chatArea = document.getElementById('chat-area');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const historyList = document.getElementById('history-list');

        // Открытие/закрытие меню
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        }

        // Загрузка истории из кэша
        function loadHistory() {
            const history = JSON.parse(localStorage.getItem('faber_history')) || [];
            historyList.innerHTML = '';
            history.forEach(item => {                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerText = item;
                historyList.appendChild(div);
            });
        }
        loadHistory();

        // Отправка сообщения
        function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // 1. Добавляем сообщение пользователя
            appendMessage('user', text);
            userInput.value = '';
            saveToHistory(text);

            // 2. Имитация загрузки (4 секунды)
            const loadingId = 'loading-' + Date.now();
            showLoading(loadingId);

            setTimeout(() => {
                removeLoading(loadingId);
                // 3. Ответ "печатной машинкой"
                const responseText = "Это симуляция ответа нейросети Faber. Я анализирую ваш запрос: " + text;
                typeWriterEffect(responseText);
            }, 4000);
        }

        // Добавление сообщения в чат
        function appendMessage(sender, text) {
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            div.innerHTML = `<div class="msg-content">${text}</div>`;
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // Сохранение в LocalStorage
        function saveToHistory(text) {
            let history = JSON.parse(localStorage.getItem('faber_history')) || [];
            history.unshift(text); // Добавляем в начало
            if (history.length > 10) history.pop(); // Храним только 10 последних
            localStorage.setItem('faber_history', JSON.stringify(history));
            loadHistory();
        }

        // Показ лоадера (змейка)
        function showLoading(id) {            const div = document.createElement('div');
            div.className = 'message ai loading';
            div.id = id;
            // SVG лоадер в стиле YouTube (крутящаяся змейка)
            div.innerHTML = `
                <div class="loader-container">
                    <svg class="snake-loader" viewBox="0 0 50 50">
                        <circle cx="25" cy="25" r="20" fill="none" stroke="#5865F2" stroke-width="4" stroke-dasharray="80" stroke-dashoffset="0" stroke-linecap="round">
                            <animate attributeName="stroke-dashoffset" from="120" to="0" dur="1s" repeatCount="indefinite" />
                            <animateTransform attributeName="transform" type="rotate" from="0 25 25" to="360 25 25" dur="1s" repeatCount="indefinite" />
                        </circle>
                    </svg>
                </div>
            `;
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function removeLoading(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        // Эффект печатной машинки
        function typeWriterEffect(text) {
            const div = document.createElement('div');
            div.className = 'message ai';
            // Контейнер для текста
            const contentDiv = document.createElement('div');
            contentDiv.className = 'msg-content';
            div.appendChild(contentDiv);
            
            // Маленький лоадер в углу пока печатает
            const cornerLoader = document.createElement('div');
            cornerLoader.className = 'typing-indicator';
            cornerLoader.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
            div.appendChild(cornerLoader);

            chatArea.appendChild(div);
            
            let i = 0;
            const speed = 30; // Скорость печати

            function type() {
                if (i < text.length) {
                    contentDiv.innerHTML += text.charAt(i);
                    i++;
                    chatArea.scrollTop = chatArea.scrollHeight;
                    setTimeout(type, speed);
                } else {                    // Убираем индикатор печати, когда закончили
                    cornerLoader.style.display = 'none';
                }
            }
            type();
        }

        // Слушатели событий
        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

    </script>
</body>
</html>
