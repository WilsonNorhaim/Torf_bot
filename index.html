<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shirma Voice</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            --text-main: #ffffff;
            --accent: #00d2ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(45deg, #1a1a2e, #16213e, #0f3460, #533483);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);            border-radius: 25px;
            box-shadow: var(--glass-shadow);
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        h2 {
            text-align: center;
            margin-bottom: 10px;
            font-weight: 300;
            letter-spacing: 2px;
        }

        /* Текстовое поле */
        textarea {
            width: 100%;
            height: 150px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 15px;
            color: #fff;
            font-size: 1rem;
            resize: none;
            outline: none;
            transition: border 0.3s;
        }

        textarea:focus {
            border-color: var(--accent);
        }

        /* Настройки */
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        select {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            outline: none;
            cursor: pointer;        }
        
        select option {
            background: #1a1a2e; /* Темный фон для выпадающего списка */
        }

        /* Кнопки */
        .buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        button:active {
            transform: scale(0.95);
        }

        .btn-play {
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.4);
        }

        .btn-stop {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Визуализация звука (эквалайзер) */
        .visualizer {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            height: 40px;
            gap: 4px;
            margin-top: 10px;            opacity: 0.3;
            transition: opacity 0.3s;
        }

        .visualizer.active {
            opacity: 1;
        }

        .bar {
            width: 6px;
            background: var(--accent);
            border-radius: 3px;
            height: 5px;
            animation: none;
        }

        .visualizer.active .bar {
            animation: bounce 1s infinite ease-in-out;
        }

        /* Разная задержка анимации для полосок */
        .bar:nth-child(1) { animation-delay: 0.1s; }
        .bar:nth-child(2) { animation-delay: 0.3s; }
        .bar:nth-child(3) { animation-delay: 0.5s; }
        .bar:nth-child(4) { animation-delay: 0.2s; }
        .bar:nth-child(5) { animation-delay: 0.4s; }
        .bar:nth-child(6) { animation-delay: 0.1s; }
        .bar:nth-child(7) { animation-delay: 0.3s; }
        .bar:nth-child(8) { animation-delay: 0.5s; }

        @keyframes bounce {
            0%, 100% { height: 5px; }
            50% { height: 35px; }
        }

    </style>
</head>
<body>

    <div class="container">
        <div class="glass-panel">
            <h2>Shirma Voice</h2>
            
            <textarea id="text-input" placeholder="Введите текст, который нужно озвучить..."></textarea>

            <div class="controls">
                <select id="voice-select">
                    <option value="" disabled selected>Загрузка голосов...</option>
                </select>
                <select id="rate-select">                    <option value="0.5">Медленно (0.5x)</option>
                    <option value="1" selected>Нормально (1x)</option>
                    <option value="1.5">Быстро (1.5x)</option>
                    <option value="2">Очень быстро (2x)</option>
                </select>
            </div>

            <!-- Визуализация -->
            <div class="visualizer" id="visualizer">
                <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                <div class="bar"></div><div class="bar"></div>
            </div>

            <div class="buttons">
                <button class="btn-play" id="speak-btn">
                    <i class="fas fa-play"></i> Читать
                </button>
                <button class="btn-stop" id="stop-btn">
                    <i class="fas fa-stop"></i> Стоп
                </button>
            </div>
        </div>
    </div>

    <!-- Иконки -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>

    <script>
        const synth = window.speechSynthesis;
        const textInput = document.getElementById('text-input');
        const voiceSelect = document.getElementById('voice-select');
        const rateSelect = document.getElementById('rate-select');
        const speakBtn = document.getElementById('speak-btn');
        const stopBtn = document.getElementById('stop-btn');
        const visualizer = document.getElementById('visualizer');

        let voices = [];

        // Функция загрузки голосов
        function populateVoices() {
            voices = synth.getVoices();
            voiceSelect.innerHTML = '';
            
            // Фильтруем и сортируем голоса (сначала русские)
            voices.sort((a, b) => {
                const aLang = a.lang.toLowerCase();
                const bLang = b.lang.toLowerCase();
                if (aLang.includes('ru') && !bLang.includes('ru')) return -1;
                if (!aLang.includes('ru') && bLang.includes('ru')) return 1;                return 0;
            });

            voices.forEach((voice) => {
                const option = document.createElement('option');
                option.textContent = `${voice.name} (${voice.lang})`;
                option.setAttribute('data-name', voice.name);
                option.setAttribute('data-lang', voice.lang);
                
                // Выбираем русский голос по умолчанию, если есть
                if (voice.lang.includes('ru') && voiceSelect.options.length === 0) {
                    option.selected = true;
                }
                
                voiceSelect.appendChild(option);
            });
        }

        // Браузеры загружают голоса асинхронно
        populateVoices();
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = populateVoices;
        }

        // Функция озвучивания
        const speak = () => {
            if (synth.speaking) {
                console.error('Уже говорит...');
                return;
            }

            if (textInput.value !== '') {
                // Визуальный эффект
                visualizer.classList.add('active');
                speakBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Говорит...';

                const utterThis = new SpeechSynthesisUtterance(textInput.value);

                // Настройка голоса
                const selectedOption = voiceSelect.selectedOptions[0].getAttribute('data-name');
                for (let i = 0; i < voices.length; i++) {
                    if (voices[i].name === selectedOption) {
                        utterThis.voice = voices[i];
                        break;
                    }
                }

                // Настройка скорости
                utterThis.rate = rateSelect.value;
                // Событие окончания речи
                utterThis.onend = (event) => {
                    visualizer.classList.remove('active');
                    speakBtn.innerHTML = '<i class="fas fa-play"></i> Читать';
                };

                // Обработка ошибок
                utterThis.onerror = (event) => {
                    visualizer.classList.remove('active');
                    speakBtn.innerHTML = '<i class="fas fa-play"></i> Читать';
                    console.error('Ошибка синтеза речи');
                };

                synth.speak(utterThis);
            }
        };

        // Обработчики кнопок
        speakBtn.addEventListener('click', (e) => {
            e.preventDefault();
            // Если уже говорит, ставим на паузу или возобновляем (опционально), 
            // но здесь просто перезапускаем или игнорируем, если не пауза
            if(synth.speaking && synth.paused) {
                synth.resume();
            } else {
                speak();
            }
        });

        stopBtn.addEventListener('click', (e) => {
            e.preventDefault();
            synth.cancel();
            visualizer.classList.remove('active');
            speakBtn.innerHTML = '<i class="fas fa-play"></i> Читать';
        });

    </script>
</body>
</html>
